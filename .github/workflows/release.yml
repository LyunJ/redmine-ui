name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Redmine UI ${{ github.ref_name }}"
          releaseBody: |
            ## 변경사항

            ### 새 기능
            - **레드마인 웹 열기**: TitleBar에 레드마인 홈 버튼(Globe 아이콘) 추가. 일감 상세 화면에 해당 일감 URL 버튼(ExternalLink 아이콘) 추가. 시스템 기본 브라우저로 열림

            ### 버그 수정
            - **Windows MSI 로케일 변경**: 설치 프로그램 언어를 en-US에서 ko-KR로 변경

            ---

            아래 Assets에서 설치 파일을 다운로드하세요.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
